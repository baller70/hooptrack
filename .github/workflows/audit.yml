name: Audit

# Code-quality audit: lint, typecheck, dead-code, dep vulns, license scan.
# Runs on every push and PR. Does NOT block the deploy workflow — it runs
# in parallel and posts results to the Actions tab.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Pin npm
        run: npm install --global npm@10

      - name: Install dependencies
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"
        run: npm ci

      - name: Rebuild native bindings (better-sqlite3)
        run: |
          npm rebuild better-sqlite3
          test -f node_modules/better-sqlite3/build/Release/better_sqlite3.node

      - name: Lint
        run: npm run verify

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Browser completeness
        env:
          CI: "true"
          NODE_OPTIONS: "--max-old-space-size=4096"
          JWT_SECRET: "ci-only-placeholder-secret-at-least-32-characters"
        run: npm run test:e2e

      - name: Dead code (knip)
        run: npm run audit:knip || true
        continue-on-error: true

      - name: Unused dependencies (depcheck)
        run: npm run audit:depcheck || true
        continue-on-error: true

      - name: Circular dependencies (madge)
        run: npm run audit:madge

      - name: License summary
        run: npm run audit:licenses || true
        continue-on-error: true

      - name: Dep vulnerability scan (npm audit)
        run: npm run audit:deps
        continue-on-error: true
