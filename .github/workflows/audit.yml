name: Audit

# Mandatory repository quality and security gate.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"
        run: npm ci

      - name: Full mandatory audit
        run: npm run audit:all

      - name: Mobile contract and production build
        env:
          CI: "true"
          NODE_OPTIONS: "--max-old-space-size=4096"
        run: npm run verify
